<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnipFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="snipflow-grad" x1="50%" y1="10%" x2="50%" y2="90%">
                        <stop offset="0%" stop-color="#00FFFF" />
                        <stop offset="100%" stop-color="#4338CA" />
                    </linearGradient>
                </defs>

                <path d="M10 60h80 M10 60v-6 M20 60v-3 M30 60v-3 M40 60v-3 M50 60v-6 M60 60v-3 M70 60v-3 M80 60v-3 M90 60v-6" stroke="#555" stroke-width="2"/>
                <rect x="10" y="64" width="80" height="3" rx="1.5" fill="#555"/>
                <rect x="10" y="70" width="80" height="3" rx="1.5" fill="#555"/>

                <path d="M28 60h44 M30 60v-3 M50 60v-3 M50 60v-6 M60 60v-3 M70 60v-3" stroke="#e0e0e0" stroke-width="2"/>
                <rect x="28" y="64" width="44" height="3" rx="1.5" fill="#e0e0e0"/>
                <rect x="28" y="70" width="44" height="3" rx="1.5" fill="#e0e0e0"/>

                <polygon points="50,15 56,44 85,50 56,56 50,85 44,56 15,50 44,44" fill="url(#snipflow-grad)"/>
            </svg>
            Snipflow
        </a>
    </nav>

    <div class="main-container">
        <h1>Transform Long Videos into Viral Highlights</h1>
        <p class="subtitle">Instantly transform any video into an engaging highlight or viral reel.</p>

        <div class="card" id="uploadPanel">
            <div class="drop-zone" id="dropZone">
                <svg viewBox="0 0 24 24">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2z"/>
                </svg>
                <h3 id="dropText">Drag & Drop your video here</h3>
                <p>or click to browse files</p>
                <input type="file" id="fileInput" class="file-input" accept="video/*">
            </div>
            <div id="durationSelector" class="hidden" style="margin-top: 1.5rem; text-align: center;">
                <label for="reelDuration" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.95rem;">Target Highlight Duration:</label>
                <select id="reelDuration" style="padding: 0.6rem 1rem; border-radius: 6px; background: #222; color: #fff; border: 1px solid var(--border-color); font-size: 1rem; width: 100%; max-width: 200px; outline: none; cursor: pointer;">
                    <option value="15">15 seconds</option>
                    <option value="20">20 seconds</option>
                    <option value="30" selected>30 seconds</option>
                    <option value="45">45 seconds</option>
                    <option value="60">60 seconds (Max)</option>
                </select>
            </div>
            <div id="collageControls" class="hidden" style="margin-top: 1.5rem; text-align: center;">
                <div style="display: flex; justify-content: center; gap: 2rem; align-items: flex-end; flex-wrap: wrap;">
                    <div style="text-align: left;">
                        <div style="display: flex; align-items: center;">
                            <input type="range" id="borderGap" min="0" max="150" value="40" style="width: 120px; accent-color: var(--primary-color);">
                            <span id="gapValue" style="margin-left: 0.7rem; color: #fff; font-variant-numeric: tabular-nums;">40px</span>
                        </div>
                    </div>
                    </div style="text-align: left;">
                        <label type="bgColor" style="display: block; margin-bottom: 0.5erem; color: var(--text-secondary); font-size: 0.9rem;">Grid Color</label>
                        <input type="color" id="bgColor" value="#f5f5f5" style="width: 60px; height: 35px; border: 1px solid #444; border-radius: 4px; background: #222; cursor: pointer;">
                    </div>
                </div>
                <div style="margin-top: 1.5rem; max-width: 400px; margin-left: auto; margin-right: auto; text-align: left;">
                    <label for="collageTitle" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Collage Title / Watermark (Bottom):</label>
                    <input type="text" id="collageTitle" placeholder="e.g. Summer Vacation 2026" style="width: 100%; padding: 0.7rem; border-radius: 6px; background: #222; color: #fff; border: 1px solid var(--border-color); outline: none; transition: border-color 0.2s;">
                </div>
            </div>
            <div id="songSection" class="hidden" style="margin-top: 1.5rem; text-align: center; border-top: 1px solid #333; padding-top: 1.5rem;">
                <h4 style="margin-bottom: 1rem; color: #fff; font-size: 1rem;">Optional: Background Music</h4>
                <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
         <button class="btn btn-outline" style="width: 100%; max-width: 300px;" id="songSelectBtn">Choose Song File</button>
                    <input type="file" id="songInput" accept="audio/*" class="hidden">
                    <div id="songName" style="color: var(--text-secondary); font-size: 0.85rem;" class="hidden"></div>
                    <div style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="replaceAudio" style="width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary-color);">
                        <label for="replaceAudio" style="color: var(--text-secondary); font-size: 0.9rem; cursor: pointer;">Replace Original Audio entirely?</label>
                    </div>
                </div>
            </div>  
            <div style="text-align: center;">
                <button class="btn" id="uploadBtn" disabled>Process Highlight</button>
            </div>
            
            <div class="progress-container hidden" id="progressContainer">
                <div class="circular-progress" id="circularProgress">
                    <svg viewBox="0 0 100 100">
                        <circle class="circular-bg" cx="50" cy="50" r="45"></circle>
                        <circle class="circular-fill" id="circularFill" cx="50" cy="50" r="45"></circle>
                    </svg>
                    <div class="circular-text" id="progressPercentage">0%</div>
                </div>
                <span class="loader hidden" id="aiLoader"></span>
                <div class="status-text" id="statusText" style="margin-top: 1.5rem;">Uploading files...</div>
            </div>
            <div id="errorText" style="color: #ff4444; text-align: center; margin-top: 1rem; display: none;"></div>
        </div>
        
        <div class="card hidden" id="resultPanel">
            <h3 style="margin-bottom: 1.5rem; text-align: center; font-weight: 600;">Your Highlight Reel is Ready</h3>
            <div class="result-container">
                <video id="resultVideo" controls style="display: none;"></video>
                <img id="resultImage" style="display: none; max-width: 100%; border-radius: 8px;" />
                <div style="display: flex; gap: 1rem;">
                    <button class="btn btn-outline" id="resetBtn">Process Another</button>
                    <a id="downloadLink" class="btn" style="text-decoration: none;">Download</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('filrInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const statusText = document.getElementById('statusText');
        const uploadPanel = document.getElementById('uploadPanel');
        const resultPanel = document.getElementById('resultPanel');
        const resultVideo = document.getElementById('resultVideo');
        const resultImage = document.getElementById('resultImage');
        const downloadLink = document.getElementById('downloadLink');
        const resetBtn = document.getElementById('resetBtn');
        const dropText = document.getElementById('dropText');
        const errorText = document.getElementById('errorText');

        let  selectedFiles = [];
        let pollInterval = null;
        let currentJobId = null;
        let currentJobType = null;
        let activeTab = 'video';

        const tabVideo = document.getElementById('tabCollage');
        const tabCollage = document.getElementById('tabCollage');
        const durationSelector = document.getElementById('durationSelector');
        const songSection = document.getElementById('songSection');
        const songInput = document.getElementById('songInput');
        const songSelectBtn = document.getElementById('songSelectBtn');
        const songNameDisplay = document.getElementById('songName');
        const replaceAudioCheckbox = document.getElementById('replaceAudio');
        
        const API_BASE = 'http://127.0.0.1.8000';

        songSelectBtn.addEventListener('click', () => songInput.click());
        songInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                songNameDisplay.innerText = "Selected: " + this.files[0].name;
                songNameDisplay.classList.remove('hidden');
            }
        });
        
        async function checkBackend() {
            try {
                const res = await fetch(`${API_BASE}/api/status/health-check`).catch(() => ({ ok: false }));
                if (!res.ok && res.status !== 404) {
                    showError('Warning: Backend server not detected. Please make sure the FASTAPI server is running.");
                }
            } catch (e) {
                showError("Warning: Backend server not detected. Please make sure the FASTAPI server is running.");            
                }
            }
            checkBackend();

            function showError(msg) {
                errorText.innerText = msg;
                errorText.style.display = 'block';
            }

            tabVideo.addEventListener('click', () => switchTab('video'));
            tabCollage.addEventListener('click', () => switchTab('collage'));

            function switchTab(tab) {
                if (activeTab === tab) return;
                activeTab = tab;

                errorText.style.display = 'none';
                selectedFiles = [];
                currentJobId = null;
                currentJobType = null;
                fileInput.value = '';

                if (tab === 'video') {
                    tabVideo.classList.add('active');
                    tabCollage.classList.remove('active');

                    document.querySelector('h1').innerText = "Transform Long Videos into Viral Highlights";
                    document.querySelector('.aubtitle').innerText = "Instantly transform any video into an engaging highlight or viral reel.";
                    dropText.accept = 'video/*';
                    fileInput.multiple = false;
                    durationSelector.classList.remove('hidden');
                    songSection.classList.remove('hidden');
                    document.getElementById('collageControls').classList.add('hidden');
                    uploadBtn.innerText = 'Process Highlight';               
                } else {    
                    tabCollage.classList.add('active');
                    tabVideo.classList.remove('active');

                    document.querySelector('h1').innerText = "Create Stunning Photo Collages";
                    document.querySelector('.subtitle').innerText = "Upload multiple photos and instantly arrange them into a beautiful into a beautiful grid.";
                    dropText.innerText = 'Drag & Drop up to 20 images here';
                    fileInput.accept = 'image/*';
                    fileInput.multiple = true;
                    durationSelector.classList.add('hidden');
                    songSection.classList.add('hidden');
                    document.getElementById('collageControls').classList.remove('hidden');
                    uploadBtn.innerText = 'Create Collage';
            }
            
            resetUploadUI();
        }

        document.getElementById('borderGap').addEventListener('input', function() {
            document.getElementById('gapValue').innerText = this.value + 'px';
        });

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName => {
                dropZone.classList.remove('dragover');
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        });
